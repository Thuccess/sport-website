<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport Website — Sponsors / Partners</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ========== STICKY NAVBAR ========== -->
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a class="logo" href="/" aria-label="Sport Website home">
        <svg width="36" height="36" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect width="24" height="24" rx="4" fill="none"></rect>
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" fill="none"></circle>
          <path d="M6 16c2-3 5-6 10-6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"></path>
        </svg>
        <span class="site-title">Sport Website</span>
      </a>

      <nav class="nav" id="mainNav" aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="/" class="nav-link">Home</a></li>
          <li><a href="/about.html" class="nav-link">About</a></li>
          <li><a href="/shop.html" class="nav-link">Shop</a></li>
          <li><a href="/gallery.html" class="nav-link">Gallery</a></li>
          <li><a href="/sponsors.html" class="nav-link">Sponsors</a></li>
        </ul>
      </nav>

      <div class="header-controls">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle dark / light">
          <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>

        <button class="menu-toggle" id="menuToggle" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="hamburger"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero-section">
    <div class="container hero-inner">
      <h1 class="hero-title">Our Sponsors & Partners</h1>
      <p class="hero-subtitle">Proudly supported by our trusted partners who make our journey possible.</p>
    </div>
  </section>

  <!-- ===== SPONSORS GRID ===== -->
  <section class="section sponsors-section">
    <div class="container">
      <h2 class="section-title">Club Sponsors</h2>
      <div class="sponsors-grid">
        <div class="sponsor-card">
          <img src="images/spornsor1.jpg" alt="Sponsor 1">
        </div>
        <div class="sponsor-card">
          <img src="images/spornsor2.jpg" alt="Sponsor 2">
        </div>
        <div class="sponsor-card">
          <img src="images/spornsor3.jpg" alt="Sponsor 3">
        </div>
        <div class="sponsor-card">
          <img src="images/spornsor4.jpg" alt="Sponsor 4">
        </div>
        <div class="sponsor-card">
          <img src="images/spornsor5.jpg" alt="Sponsor 5">
        </div>
      </div>
    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Sport Website — All rights reserved.</p>
      <p class="motto">Club motto: Pride • Passion • Power</p>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
